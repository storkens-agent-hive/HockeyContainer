name: Build and Push with Podman to Quay.io

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  QUAY_REPO: quay.io/eksta_mannen/hockeypong

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Podman
        uses: containers/podman-action@v1

      - name: Login to Quay.io
        run: |
          echo "${{ secrets.QUAY_PASSWORD }}" | podman login --username "${{ secrets.QUAY_USERNAME }}" --password-stdin quay.io

      - name: Build container image
        run: |
          podman build -t ${{ env.QUAY_REPO }}:latest -t ${{ env.QUAY_REPO }}:${{ github.sha }} -f Containerfile .

      - name: Push container image
        if: github.event_name != 'pull_request'
        run: |
          podman push ${{ env.QUAY_REPO }}:latest
          podman push ${{ env.QUAY_REPO }}:${{ github.sha }}
