
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rink Pong Hockey (2P / 6 chars)</title>
  <style>
    html, body { height: 100%; margin: 0; background:#0b0f14; color:#e8eef7; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;}
    .wrap { height: 100%; display:flex; align-items:center; justify-content:center; padding: 16px; box-sizing:border-box;}
    .panel { width:min(1100px, 95vw); }
    #hud { display:flex; gap:12px; align-items:baseline; justify-content:space-between; margin: 0 0 10px 0; flex-wrap:wrap; }
    #score { margin-top: 18px; text-align: center; font-size: 56px; font-weight: 900; letter-spacing: 3px; }
    #help { font-size: 12px; opacity:0.9; line-height:1.35; max-width: 820px; }
    canvas { width:100%; background:#0c1320; border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
    .pill { display:inline-block; padding:2px 8px; border:1px solid rgba(255,255,255,0.18); border-radius:999px; margin: 0 6px 4px 0; }
    .red { color:#ff5252; }
    .blue { color:#4da3ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div id="hud">
        <div id="help">
          <span class="pill red">Red</span> WASD · E toggle · F hold · T/G goalie &mdash; or pads 1&amp;2: pad1=sk0+goalie, pad2=sk1
          <br/>
          <span class="pill blue">Blue</span> Arrows · . toggle · RShift hold · O/L goalie &mdash; or pads 3&amp;4: pad3=sk0+goalie, pad4=sk1
          <br/>
        </div>
      </div>
      <canvas id="c"></canvas>
      <div id="score">Red 0 — 0 Blue</div>
    </div>
  </div>

<script>
(() => {
  const canvas  = document.getElementById('c');
  const ctx     = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');

  // Logical game dimensions — all physics/drawing uses these coordinates
  const LOGICAL_W = 1000, LOGICAL_H = 500;

  // Size the canvas buffer to its exact CSS display size * devicePixelRatio,
  // then scale the context so game code still draws in logical coordinates.
  // This eliminates the browser's CSS-scaling compositing step.
  function resizeCanvas() {
    const dpr     = window.devicePixelRatio || 1;
    const cssW    = canvas.clientWidth;
    const cssH    = Math.round(cssW * LOGICAL_H / LOGICAL_W);
    canvas.style.height   = cssH + 'px';
    canvas.width  = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(canvas.width / LOGICAL_W, canvas.height / LOGICAL_H);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ==========================================================
  // SKATER SPRITES (4 variants) — TEAM x HOLDING
  // ==========================================================
  const skaterSprites = {
    red:  { free: new Image(), hold: new Image() },
    blue: { free: new Image(), hold: new Image() }
  };
  let spritesReady = false;

  function loadSkaterSprites() {
    skaterSprites.red.free.src   = "red_free.png";
    skaterSprites.red.hold.src   = "red_hold.png";
    skaterSprites.blue.free.src  = "blue_free.png";
    skaterSprites.blue.hold.src  = "blue_hold.png";

    const imgs = [
      skaterSprites.red.free,  skaterSprites.red.hold,
      skaterSprites.blue.free, skaterSprites.blue.hold
    ];
    let loaded = 0;
    const done = () => { if (++loaded === imgs.length) spritesReady = true; };
    imgs.forEach(img => { if (img.complete) done(); else { img.onload = done; img.onerror = done; } });
  }

  // ==========================================================
  // GLOBAL TIMING
  // ==========================================================
  const TIME_SCALE = 1.0;
  const BASE_FPS   = 60;
  const MAX_DT_SEC = 1 / 20;

  let gameNowMs  = 0;
  let lastRealTs = 0;

  // Fixed-timestep accumulator: physics steps by exactly FIXED_DT_SEC;
  // renderer interpolates positions by leftover fraction for smooth motion.
  const FIXED_DT_SEC = 1 / 60;
  let accumulator = 0;

  // ==========================================================
  // CONSTANTS
  // ==========================================================
  const W = LOGICAL_W, H = LOGICAL_H;
  const rinkPad = 28;
  const cornerR = 70;

  const goalWidthFrac   = 0.46;
  const goalDepth       = 8;
  const goalieThickness = 35;
  const goalLineInset   = 80;
  const goalBar         = 6;

  const puckR = 8;
  let prevPuckX = W / 2;

  const PUCK_MAX_STEP_PX = 2.5;

  const skaterSize  = { w: 35,              h: 35  };
  const goalieSize  = { w: goalieThickness, h: 100 };
  const goalieXOffset = 6;

  const skaterSpeed = 8;
  const goalieSpeed = 12;

  const tackleRange    = 60;
  const tackleStrength = 20;
  const tackleFriction = 0.75;

  const goalieKeepoutStrength = 12;
  const tackleCooldownMs      = 500;
  const pickupRadius          = 45;
  const pickupRadiusSq        = pickupRadius * pickupRadius;

  const wallDamp = 0.66;

  // Speed limits as raw 60-fps pixel-per-frame values.
  // enforceMinSpeed() uses these directly; they stay framerate-independent
  // because the puck velocity is also stored in the same units.
  const minSpeed60 = 1.2;
  const maxSpeed60 = 25.0;

  const shove       = 0.35;
  const releaseBase = 22.0;
  const winScore    = 10;

  const PICKUP_LOCK_MS           = 500;
  const SHOOTER_IGNORE_COLLIDE_MS = 80;

  // Pre-allocated opts sentinels — avoids a fresh object allocation on every
  // collidePuck / resolveSkaterVsRect call inside the hot substep loops.
  const OPTS_ENTITY = { isEntity: true,  damp: false };
  const OPTS_DAMP   = { isEntity: false, damp: true  };
  const OPTS_GOALIE = { goalieStrip: true  };
  const OPTS_STATIC = { goalieStrip: false };

  // ==========================================================
  // FX / FLOW STATE
  // ==========================================================
  const padPrev = [ { buttons: [] }, { buttons: [] }, { buttons: [] }, { buttons: [] } ];

  let goalFlashUntil = 0, goalFlashText = "", goalFlashColor = "#ffffff";
  let controlsLockedUntil = 0;
  let shakeUntil = 0, shakeDurationMs = 0, shakeAmpBase = 0;
  let redRestartReady = false, blueRestartReady = false;
  let gameOver = false, winner = null;

  function triggerShake(nowMs, durationMs, ampPx) {
    const currentStrength = (shakeUntil > nowMs) ? shakeAmpBase : 0;
    if (ampPx >= currentStrength) {
      shakeDurationMs = durationMs; shakeAmpBase = ampPx; shakeUntil = nowMs + durationMs;
    } else if (shakeUntil < nowMs + durationMs) {
      shakeUntil = nowMs + durationMs;
    }
  }

  // ==========================================================
  // UTILITIES
  // ==========================================================
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const sign  = (v) => (v === 0 ? 0 : (v > 0 ? 1 : -1));
  const norm  = (x, y) => {
    const L = Math.hypot(x, y);
    return L > 1e-6 ? { x: x / L, y: y / L } : { x: 0, y: 0 };
  };

  function normalizeInput(ax, ay) {
    const m = Math.hypot(ax, ay);
    return m < 1e-9 ? { ax: 0, ay: 0 } : { ax: ax / m, ay: ay / m };
  }

  function roundedRectPath(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y,     x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x,     y + h, r);
    ctx.arcTo(x,     y + h, x,     y,     r);
    ctx.arcTo(x,     y,     x + w, y,     r);
    ctx.closePath();
  }

  // ==========================================================
  // INPUT
  // ==========================================================
  const keys = new Set(), pressed = new Set();
  const keysByChar = new Set(), pressedByChar = new Set();

  window.addEventListener('keydown', (e) => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))
      e.preventDefault();
    keys.add(e.code); pressed.add(e.code);
    keysByChar.add(e.key); pressedByChar.add(e.key);

    if (!gameOver) {
      if (e.code === 'KeyE') {
        if (getPadCount() < 3) {  // disabled when red has dedicated pads
          if (puck.heldBy === red.skaters[red.active]) releaseIfNeeded(red, false, gameNowMs);
          red.active = 1 - red.active;
        }
      }
      if (e.code === 'Period') {
        if (getPadCount() < 4) {  // disabled when blue has dedicated pads
          if (puck.heldBy === blue.skaters[blue.active]) releaseIfNeeded(blue, false, gameNowMs);
          blue.active = 1 - blue.active;
        }
      }
    }
  }, { passive: false });

  window.addEventListener('keyup', (e) => { keys.delete(e.code); keysByChar.delete(e.key); });

  function deadzone(v, dz = 0.18) { return Math.abs(v) < dz ? 0 : v; }

  // Returns how many gamepads are currently connected (indices 0-3)
  function getPadCount() {
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    let n = 0;
    for (let i = 0; i < 4; i++) if (pads[i]) n = i + 1;
    return n;
  }

  function readPad(index) {
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    const pad  = pads[index];
    if (!pad) return null;

    const ax = deadzone(pad.axes[0] || 0);
    const ay = deadzone(pad.axes[1] || 0);
    const holdDown      = !!pad.buttons[0]?.pressed;
    const holdPressed   = holdDown && !padPrev[index].buttons[0];
    const togglePressed = !!pad.buttons[2]?.pressed && !padPrev[index].buttons[1];

    let goalieY = 0;
    if (pad.buttons[13]?.pressed) goalieY = -1;
    if (pad.buttons[12]?.pressed) goalieY =  1;
    if (pad.buttons[4]?.pressed)  goalieY = -1;
    if (pad.buttons[5]?.pressed)  goalieY =  1;

    padPrev[index].buttons[0] = holdDown;
    padPrev[index].buttons[1] = !!pad.buttons[2]?.pressed;

    return { ax, ay, holdDown, holdPressed, togglePressed, goalieY };
  }

  // ==========================================================
  // ENTITIES + RINK
  // ==========================================================
  function makeSkater(team, x, y) {
    return {
      team, x, y, spawnX: x, spawnY: y,
      w: skaterSize.w, h: skaterSize.h,
      vx: 0, vy: 0, lastMoveX: 0, lastMoveY: 0, kbVx: 0, kbVy: 0,
      heading: (team === 'red') ? 0 : Math.PI
    };
  }

  function makeGoalie(team, x, y) {
    return {
      team, x, y, spawnX: x, spawnY: y,
      w: goalieSize.w, h: goalieSize.h,
      vx: 0, vy: 0, lastMoveX: 0, lastMoveY: 0, isGoalie: true
    };
  }

  const inner = { x: rinkPad, y: rinkPad, w: W - 2 * rinkPad, h: H - 2 * rinkPad };

  const goalOpenH = inner.h * goalWidthFrac;
  const goalTop   = inner.y + (inner.h - goalOpenH) / 2;
  const goalBot   = goalTop + goalOpenH;

  const leftGoalLineX  = inner.x + goalLineInset;
  const rightGoalLineX = inner.x + inner.w - goalLineInset;

  const puck = { x: W/2, y: H/2, vx: 4.2, vy: 2.6, heldBy: null, ignoreEnt: null, ignoreUntil: 0 };

  const red = {
    color: '#ff3333', score: 0, active: 0, lastTackleAt: -Infinity, pickupLockUntil: 0,
    skaters: [
      makeSkater('red', inner.x + 220, inner.y + inner.h * 0.33),
      makeSkater('red', inner.x + 220, inner.y + inner.h * 0.67),
    ],
    goalie: makeGoalie('red', inner.x + goalDepth + 6, inner.y + inner.h / 2 - goalieSize.h / 2)
  };

  const blue = {
    color: '#0000ff', score: 0, active: 0, lastTackleAt: -Infinity, pickupLockUntil: 0,
    skaters: [
      makeSkater('blue', inner.x + inner.w - 220, inner.y + inner.h * 0.33),
      makeSkater('blue', inner.x + inner.w - 220, inner.y + inner.h * 0.67),
    ],
    goalie: makeGoalie('blue', inner.x + inner.w - (goalDepth + 6) - goalieSize.w, inner.y + inner.h / 2 - goalieSize.h / 2)
  };

  red.goalie.x  = leftGoalLineX  + goalieXOffset;
  blue.goalie.x = rightGoalLineX - goalieXOffset - blue.goalie.w;

  // ==========================================================
  // CACHED GEOMETRY — computed once, reused every frame
  // ==========================================================
  const GOAL_FRAME_RECTS = [
    { x: inner.x + goalLineInset - goalBar, y: goalTop, w: goalBar, h: goalBot - goalTop },
    { x: inner.x + inner.w - goalLineInset, y: goalTop, w: goalBar, h: goalBot - goalTop }
  ];
  const GOALIE_BOUNDS = { x: inner.x, y: goalTop, w: inner.w, h: goalBot - goalTop };

  // Flat cached arrays — no per-frame spreading or filtering
  const ALL_SKATERS  = [...red.skaters, ...blue.skaters];
  const ALL_ENTITIES = [...red.skaters, red.goalie, ...blue.skaters, blue.goalie];

  // ==========================================================
  // RESET / GAME FLOW
  // ==========================================================
  function resetPuck() {
    puck.x = W/2; puck.y = H/2; puck.heldBy = null;
    puck.vx = 0; puck.vy = 0; puck.ignoreEnt = null; puck.ignoreUntil = 0;
  }

  function resetSkaters() {
    for (const s of ALL_SKATERS) { s.x = s.spawnX; s.y = s.spawnY; s.vx = s.vy = s.kbVx = s.kbVy = 0; }
    red.active = blue.active = 0;
  }

  function resetGame() {
    red.score = blue.score = 0;
    gameOver = false; winner = null;
    redRestartReady = blueRestartReady = false;
    goalFlashUntil = 0; goalFlashText = ""; goalFlashColor = "#ffffff";
    controlsLockedUntil = 0;
    shakeUntil = shakeDurationMs = shakeAmpBase = 0;
    red.pickupLockUntil = blue.pickupLockUntil = 0;
    resetPuck(); resetSkaters();
  }

  // ==========================================================
  // COLLISIONS
  // ==========================================================
  function rectCircleCollide(rect, cx, cy, cr) {
    const dx = cx - clamp(cx, rect.x, rect.x + rect.w);
    const dy = cy - clamp(cy, rect.y, rect.y + rect.h);
    return dx * dx + dy * dy <= cr * cr;
  }

  function rectRectOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
  }

  // --------------------------
  // UNIFIED SKATER COLLISION
  //
  // resolveSkaterVsSkater(a, b, symmetric)
  //   Circle-based. symmetric=true: push both (relaxation pass).
  //                 symmetric=false: push only `a` out of `b` (substep).
  //
  // resolveSkaterVsRect(skater, block, opts, nowMs)
  //   Rect-based. OPTS_GOALIE: keepout impulse + puck-strip.
  //               OPTS_STATIC: plain immovable block (goal bars).
  // --------------------------
  const skaterRadius = (s) => Math.min(s.w, s.h) * 0.5;
  const skaterCX     = (s) => s.x + s.w * 0.5;
  const skaterCY     = (s) => s.y + s.h * 0.5;

  // Cancel all velocity (vx/vy and kbVx/kbVy) moving into the collision normal
  // so skater-vs-skater behaves like a wall: you simply stop against the other.
  function cancelVelocityAlongNormal(s, nx, ny) {
    const dot = s.vx * nx + s.vy * ny;
    if (dot > 0) { s.vx -= dot * nx; s.vy -= dot * ny; }
    const kbDot = s.kbVx * nx + s.kbVy * ny;
    if (kbDot > 0) { s.kbVx -= kbDot * nx; s.kbVy -= kbDot * ny; }
  }

  function resolveSkaterVsSkater(a, b, symmetric = true) {
    let dx = skaterCX(b) - skaterCX(a), dy = skaterCY(b) - skaterCY(a);
    let dist = Math.hypot(dx, dy);
    const minDist = skaterRadius(a) + skaterRadius(b);
    if (dist >= minDist) return false;

    if (dist < 1e-6) {
      const ang = Math.random() * Math.PI * 2;
      dx = Math.cos(ang); dy = Math.sin(ang); dist = 1;
    }

    const nx = dx / dist, ny = dy / dist;
    const pen = minDist - dist;

    if (symmetric) {
      const push = pen * 0.5 + 0.25;
      a.x -= nx * push; a.y -= ny * push;
      b.x += nx * push; b.y += ny * push;
      // nx/ny points a->b, so a's "into b" direction is +nx/ny, b's is -nx/-ny
      cancelVelocityAlongNormal(a,  nx,  ny);
      cancelVelocityAlongNormal(b, -nx, -ny);
    } else {
      // one-sided: push a away from b (opposite of a->b direction)
      const push = pen + 0.25;
      a.x -= nx * push; a.y -= ny * push;
      cancelVelocityAlongNormal(a,  nx,  ny);
    }
    return true;
  }

  function resolveSkaterVsRect(skater, block, opts, nowMs) {
    const goalieStrip = opts.goalieStrip;
    const ox = Math.min(skater.x + skater.w, block.x + block.w) - Math.max(skater.x, block.x);
    const oy = Math.min(skater.y + skater.h, block.y + block.h) - Math.max(skater.y, block.y);
    if (ox <= 0 || oy <= 0) return false;

    const sCx = skater.x + skater.w / 2, sCy = skater.y + skater.h / 2;
    const bCx = block.x  + block.w  / 2, bCy = block.y  + block.h  / 2;

    if (ox < oy) {
      const dir = (sCx < bCx) ? -1 : 1;
      skater.x += dir * (ox + 0.5);
      if (goalieStrip) skater.kbVx += dir * goalieKeepoutStrength;
      else             skater.kbVx  = 0;
    } else {
      const dir = (sCy < bCy) ? -1 : 1;
      skater.y += dir * (oy + 0.5);
      if (goalieStrip) skater.kbVy += dir * goalieKeepoutStrength;
      else             skater.kbVy  = 0;
    }

    if (goalieStrip && puck.heldBy === skater) {
      const holderTeam = (skater.team === 'red') ? red : blue;
      let ySign = Math.sign(sCy - bCy);
      if (ySign === 0) ySign = (Math.random() < 0.5 ? -1 : 1);
      const vx = (block.team === 'red') ? +maxSpeed60 : -maxSpeed60;
      stripPuckFromHolder(skater, holderTeam, nowMs, vx, ySign * releaseBase * 0.45);
    }
    return true;
  }

  function postResolveSkaterEnvironment(s, nowMs) {
    s.x = clamp(s.x, inner.x, inner.x + inner.w - s.w);
    s.y = clamp(s.y, inner.y, inner.y + inner.h - s.h);

    if (!s.isGoalie) {
      for (const bar of GOAL_FRAME_RECTS) {
        for (let i = 0; i < 4; i++) {
          if (!rectRectOverlap(s, bar)) break;
          resolveSkaterVsRect(s, bar, OPTS_STATIC, nowMs);
        }
      }
    }

    resolveSkaterVsRect(s, red.goalie,  OPTS_GOALIE, nowMs);
    resolveSkaterVsRect(s, blue.goalie, OPTS_GOALIE, nowMs);

    s.x = clamp(s.x, inner.x, inner.x + inner.w - s.w);
    s.y = clamp(s.y, inner.y, inner.y + inner.h - s.h);
  }

  function resolveAllSkaterOverlaps(nowMs, passes = 5) {
    for (let p = 0; p < passes; p++) {
      let any = false;
      for (let i = 0; i < ALL_SKATERS.length; i++)
        for (let j = i + 1; j < ALL_SKATERS.length; j++)
          if (resolveSkaterVsSkater(ALL_SKATERS[i], ALL_SKATERS[j], true)) any = true;
      for (const s of ALL_SKATERS) postResolveSkaterEnvironment(s, nowMs);
      if (!any) break;
    }
  }

  function resolveSkaterVsOthersDuringSubstep(mover, nowMs) {
    for (const o of ALL_SKATERS) {
      if (o === mover) continue;
      for (let it = 0; it < 2; it++) {
        if (!resolveSkaterVsSkater(mover, o, false)) break;
        postResolveSkaterEnvironment(mover, nowMs);
      }
    }
  }

  // ==========================================================
  // PUCK SPEED
  //
  // Velocities are stored as pixels-per-60fps-frame. Min/max clamps are
  // applied in those same units, so they are framerate-independent.
  // ==========================================================
  function enforceMinSpeed() {
    if (!puck.heldBy && puck.vx === 0 && puck.vy === 0) return;
    if (Math.abs(puck.vx) < minSpeed60) puck.vx = sign(puck.vx || 1) * minSpeed60;
    if (Math.abs(puck.vy) < minSpeed60) puck.vy = sign(puck.vy || 1) * minSpeed60;
    puck.vx = clamp(puck.vx, -maxSpeed60, maxSpeed60);
    puck.vy = clamp(puck.vy, -maxSpeed60, maxSpeed60);
  }

  function armPuckIfDead() {
    if (puck.heldBy || puck.vx !== 0 || puck.vy !== 0) return;
    puck.vx = (Math.random() < 0.5 ? -1 : 1) * minSpeed60;
    puck.vy = (Math.random() < 0.5 ? -1 : 1) * minSpeed60;
  }

  function activateSkaterOnHit(ent) {
    if (ent.isGoalie) return;
    const team = (ent.team === 'red') ? red : blue;
    const i    = team.skaters.indexOf(ent);
    if (i !== -1 && team.active !== i) team.active = i;
  }

  function puckWallBounce() {
    if (puck.y - puckR <= inner.y)              { puck.y = inner.y + puckR;              puck.vy = -puck.vy * wallDamp; }
    else if (puck.y + puckR >= inner.y + inner.h) { puck.y = inner.y + inner.h - puckR;  puck.vy = -puck.vy * wallDamp; }
    if (puck.x - puckR <= inner.x)              { puck.x = inner.x + puckR;              puck.vx = -puck.vx * wallDamp; }
    else if (puck.x + puckR >= inner.x + inner.w) { puck.x = inner.x + inner.w - puckR;  puck.vx = -puck.vx * wallDamp; }
    enforceMinSpeed();
  }

  // ==========================================================
  // UNIFIED PUCK COLLISION
  //
  // target — entity (skater/goalie) or plain rect { x,y,w,h }.
  // opts   — OPTS_ENTITY: ignore-window + activateSkaterOnHit + shove
  //          OPTS_DAMP:   apply wallDamp on bounce
  // ==========================================================
  function collidePuck(target, nowMs, opts) {
    const isEntity = opts.isEntity;
    if (isEntity && puck.ignoreEnt === target && nowMs < puck.ignoreUntil) return false;
    if (!rectCircleCollide(target, puck.x, puck.y, puckR)) return false;

    armPuckIfDead();
    if (isEntity) activateSkaterOnHit(target);

    const cx = puck.x, cy = puck.y;
    const penLeft   = (cx + puckR) - target.x;
    const penRight  = (target.x + target.w) - (cx - puckR);
    const penTop    = (cy + puckR) - target.y;
    const penBottom = (target.y + target.h) - (cy - puckR);
    const minPen    = Math.min(penLeft, penRight, penTop, penBottom);
    const eps       = 0.5;
    const df        = opts.damp ? wallDamp : 1;

    if      (minPen === penLeft)   { puck.x = target.x - puckR - eps;              if (puck.vx > 0) puck.vx = -puck.vx * df; }
    else if (minPen === penRight)  { puck.x = target.x + target.w + puckR + eps;   if (puck.vx < 0) puck.vx = -puck.vx * df; }
    else if (minPen === penTop)    { puck.y = target.y - puckR - eps;              if (puck.vy > 0) puck.vy = -puck.vy * df; }
    else                           { puck.y = target.y + target.h + puckR + eps;   if (puck.vy < 0) puck.vy = -puck.vy * df; }

    if (isEntity) {
      if (target.vx !== 0) puck.vx += sign(target.vx) * shove;
      if (target.vy !== 0) puck.vy += sign(target.vy) * shove;
    }

    enforceMinSpeed();
    return true;
  }

  function stripPuckFromHolder(holder, holderTeam, nowMs, impulseVx, impulseVy) {
    puck.heldBy = null;
    holderTeam.pickupLockUntil = nowMs + PICKUP_LOCK_MS;
    puck.x = holder.x + holder.w / 2;
    puck.y = holder.y + holder.h / 2;
    puck.vx = impulseVx; puck.vy = impulseVy;
    enforceMinSpeed();
    puck.ignoreEnt   = holder;
    puck.ignoreUntil = nowMs + SHOOTER_IGNORE_COLLIDE_MS;
  }

  // ==========================================================
  // MOVEMENT
  // ==========================================================
  function moveSkaterWithSubsteps(skater, ax, ay, speed, boundsRect, stepScale, nowMs) {
    skater.vx = ax * speed;
    skater.vy = ay * speed;
    if (skater.vx !== 0 || skater.vy !== 0) { skater.lastMoveX = skater.vx; skater.lastMoveY = skater.vy; }

    const totalVx = skater.vx + skater.kbVx;
    const totalVy = skater.vy + skater.kbVy;
    if (Math.hypot(totalVx, totalVy) > 0.05) skater.heading = Math.atan2(totalVy, totalVx);

    const travel = Math.max(Math.abs(totalVx * stepScale), Math.abs(totalVy * stepScale));
    const steps  = Math.min(12, Math.max(1, Math.ceil(travel / 4)));
    const sub    = stepScale / steps;

    // Math.pow gives correct time-independent exponential decay at any framerate
    const subDecay = Math.pow(tackleFriction, sub);

    for (let i = 0; i < steps; i++) {
      // Decay before position update so we use the average velocity over
      // the substep rather than the velocity at its start, reducing overshoot
      // at low framerates.
      skater.kbVx *= subDecay;
      skater.kbVy *= subDecay;

      skater.x += (skater.vx + skater.kbVx) * sub;
      skater.y += (skater.vy + skater.kbVy) * sub;

      skater.x = clamp(skater.x, boundsRect.x, boundsRect.x + boundsRect.w - skater.w);
      skater.y = clamp(skater.y, boundsRect.y, boundsRect.y + boundsRect.h - skater.h);

      postResolveSkaterEnvironment(skater, nowMs);
      resolveSkaterVsOthersDuringSubstep(skater, nowMs);
    }
  }

  function moveEntity(ent, ax, ay, speed, boundsRect, stepScale, nowMs) {
    if (ent.isGoalie) {
      ent.vx = ax * speed; ent.vy = ay * speed;
      if (ent.vx !== 0 || ent.vy !== 0) { ent.lastMoveX = ent.vx; ent.lastMoveY = ent.vy; }
      ent.x = clamp(ent.x + ent.vx * stepScale, boundsRect.x, boundsRect.x + boundsRect.w - ent.w);
      ent.y = clamp(ent.y + ent.vy * stepScale, boundsRect.y, boundsRect.y + boundsRect.h - ent.h);
      return;
    }
    moveSkaterWithSubsteps(ent, ax, ay, speed, boundsRect, stepScale, nowMs);
  }

  // ==========================================================
  // INTERACTIONS
  // ==========================================================
  function tryHold(team, activeSkater, holdKeyDown, nowMs) {
    if (!holdKeyDown || puck.heldBy || nowMs < team.pickupLockUntil) return;
    const ex = activeSkater.x + activeSkater.w / 2;
    const ey = activeSkater.y + activeSkater.h / 2;
    const dx = puck.x - ex, dy = puck.y - ey;
    if (dx * dx + dy * dy > pickupRadiusSq) return;

    puck.heldBy = activeSkater;
    armPuckIfDead();
    puck.vx = (sign(puck.vx) || (activeSkater.team === 'red' ? 1 : -1)) * minSpeed60;
    puck.vy = (sign(puck.vy) || 1) * minSpeed60;
    puck.x  = ex; puck.y = ey;
  }

  function releaseIfNeeded(team, keyCurrentlyDown, nowMs) {
    if (keyCurrentlyDown || !puck.heldBy) return;
    const holder = puck.heldBy;
    if (!team.skaters.includes(holder) && team.goalie !== holder) return;

    let lm = norm(holder.lastMoveX, holder.lastMoveY);
    if (lm.x === 0 && lm.y === 0) { const a = Math.random() * Math.PI * 2; lm = { x: Math.cos(a), y: Math.sin(a) }; }

    puck.x = holder.x + holder.w / 2;
    puck.y = holder.y + holder.h / 2;
    puck.heldBy = null;
    team.pickupLockUntil = nowMs + PICKUP_LOCK_MS;
    puck.ignoreEnt   = holder;
    puck.ignoreUntil = nowMs + SHOOTER_IGNORE_COLLIDE_MS;
    puck.vx = lm.x * releaseBase;
    puck.vy = lm.y * releaseBase * 0.75;
    enforceMinSpeed();
  }

  function attemptTackle(attacker, attackerTeam, opponentTeam, nowMs) {
    if (nowMs - attackerTeam.lastTackleAt < tackleCooldownMs) return false;

    const ax = attacker.x + attacker.w / 2, ay = attacker.y + attacker.h / 2;
    const targets = [];
    for (const opp of opponentTeam.skaters) {
      const ox = opp.x + opp.w / 2, oy = opp.y + opp.h / 2;
      const d  = Math.hypot(ox - ax, oy - ay);
      if (d < tackleRange) targets.push({ opp, ox, oy, d });
    }
    if (targets.length === 0) return false;

    for (const t of targets) {
      const dir = norm(t.ox - ax, t.oy - ay);
      t.opp.kbVx += dir.x * tackleStrength;
      t.opp.kbVy += dir.y * tackleStrength;
    }

    const holderTarget = targets.find(t => t.opp === puck.heldBy);
    if (holderTarget) {
      const victim     = holderTarget.opp;
      const victimTeam = (victim.team === 'red') ? red : blue;
      const clearX     = (attackerTeam === red) ? 1 : -1;
      const popSpeed   = releaseBase * 0.8;
      let vyDir = norm(holderTarget.ox - ax, holderTarget.oy - ay).y;
      if (Math.abs(vyDir) < 0.2) vyDir = (Math.random() < 0.5 ? -1 : 1) * 0.6;
      stripPuckFromHolder(victim, victimTeam, nowMs, clearX * popSpeed, vyDir * popSpeed * 0.6);
    }

    attackerTeam.lastTackleAt = nowMs;
    triggerShake(nowMs, 250, 7);
    return true;
  }

  function checkGoal() {
    if (puck.y < goalTop || puck.y > goalBot) return false;

    if (prevPuckX - puckR >  leftGoalLineX &&
        puck.x   - puckR <= leftGoalLineX + goalBar + 1 && puck.vx < 0) {
      blue.score++;
      resetPuck(); resetSkaters();
      if (blue.score >= winScore) { gameOver = true; winner = 'Blue'; }
      goalFlashUntil = gameNowMs + 1000; goalFlashText = "Blue scores!"; goalFlashColor = blue.color;
      controlsLockedUntil = goalFlashUntil;
      triggerShake(gameNowMs, 1000, 14);
      return true;
    }

    if (prevPuckX + puckR <  rightGoalLineX &&
        puck.x   + puckR >= rightGoalLineX - goalBar - 1 && puck.vx > 0) {
      red.score++;
      resetPuck(); resetSkaters();
      if (red.score >= winScore) { gameOver = true; winner = 'Red'; }
      goalFlashUntil = gameNowMs + 1000; goalFlashText = "Red scores!"; goalFlashColor = red.color;
      controlsLockedUntil = goalFlashUntil;
      triggerShake(gameNowMs, 1000, 14);
      return true;
    }

    return false;
  }

  // ==========================================================
  // UPDATE
  // ==========================================================
  function update(realDtSec) {
    if (gameOver) {
      const rPad = readPad(0), bPad = readPad(1);
      // Any pad assigned to a team can trigger restart; keyboard is fallback
      const pcR = getPadCount();
      const p0r = readPad(0), p1r = readPad(1), p2r = readPad(2), p3r = readPad(3);
      // Red restart: pad0 always red; pad1 is red only in 3-pad split
      if (p0r?.holdPressed || (pcR === 3 && p1r?.holdPressed) || (!p0r && pressed.has('KeyF')))
        redRestartReady = true;
      // Blue restart: pad1 in 1-2 pad mode; pad2 in 3-4 pad mode; pad3 also in 4-pad mode
      const bluePad = pcR >= 3 ? p2r : p1r;
      if (bluePad?.holdPressed || (pcR >= 4 && p3r?.holdPressed) || (!bluePad && pressed.has('ShiftRight')))
        blueRestartReady = true;
      if (redRestartReady && blueRestartReady) resetGame();
      pressed.clear(); pressedByChar.clear();
      return;
    }

    const dtSecClamped = Math.min(MAX_DT_SEC, Math.max(0, realDtSec));
    const stepScale    = dtSecClamped * BASE_FPS * TIME_SCALE;

    gameNowMs += dtSecClamped * 1000 * TIME_SCALE;
    const now = gameNowMs;

    if (now < controlsLockedUntil) { pressed.clear(); pressedByChar.clear(); return; }

    // Determine pad layout based on how many controllers are connected:
    //   1-2 pads: classic mode  — pad0=red team, pad1=blue team
    //   3 pads:   red split     — pad0=red sk0+goalie, pad1=red sk1, pad2=blue team
    //   4 pads:   full split    — pad0=red sk0+goalie, pad1=red sk1,
    //                             pad2=blue sk0+goalie, pad3=blue sk1
    const padCount  = getPadCount();
    const redSplit  = padCount >= 3;
    const blueSplit = padCount >= 4;

    // Pad assignments
    const rPad0 = readPad(0);                          // red sk0 (or whole red team)
    const rPad1 = redSplit  ? readPad(1) : null;       // red sk1 (split only)
    const bPad0 = readPad(redSplit ? 2 : 1);           // blue sk0 (or whole blue team)
    const bPad1 = blueSplit ? readPad(3) : null;       // blue sk1 (split only)

    // ── RED hold/press ──
    // In split mode each skater has its own hold button; in classic mode
    // the single pad (or keyboard) controls the active skater.
    const redHoldDown0    = rPad0 ? rPad0.holdDown    : keys.has('KeyF');
    const redHoldPressed0 = rPad0 ? rPad0.holdPressed : pressed.has('KeyF');
    const redHoldDown1    = rPad1 ? rPad1.holdDown    : (redSplit ? false : redHoldDown0);
    const redHoldPressed1 = rPad1 ? rPad1.holdPressed : (redSplit ? false : redHoldPressed0);
    // For classic mode the "active" skater's hold state is what matters
    const redHoldDown    = redSplit ? redHoldDown0    : (red.active === 0 ? redHoldDown0    : redHoldDown1);
    const redHoldPressed = redSplit ? redHoldPressed0 : (red.active === 0 ? redHoldPressed0 : redHoldPressed1);

    // ── BLUE hold/press ──
    const blueHoldDown0    = bPad0 ? bPad0.holdDown    : keys.has('ShiftRight');
    const blueHoldPressed0 = bPad0 ? bPad0.holdPressed : pressed.has('ShiftRight');
    const blueHoldDown1    = bPad1 ? bPad1.holdDown    : (blueSplit ? false : blueHoldDown0);
    const blueHoldPressed1 = bPad1 ? bPad1.holdPressed : (blueSplit ? false : blueHoldPressed0);
    const blueHoldDown    = blueSplit ? blueHoldDown0    : (blue.active === 0 ? blueHoldDown0    : blueHoldDown1);
    const blueHoldPressed = blueSplit ? blueHoldPressed0 : (blue.active === 0 ? blueHoldPressed0 : blueHoldPressed1);

    // ── Toggle active skater (classic / keyboard only) ──
    if (!redSplit) {
      if (rPad0?.togglePressed) {
        if (puck.heldBy === red.skaters[red.active]) releaseIfNeeded(red, false, now);
        red.active = 1 - red.active;
      }
    }
    if (!blueSplit) {
      if (bPad0?.togglePressed) {
        if (puck.heldBy === blue.skaters[blue.active]) releaseIfNeeded(blue, false, now);
        blue.active = 1 - blue.active;
      }
    }

    // In split mode active skater is whichever pad last moved; we just always
    // move both skaters independently so active only matters for hold/tackle.
    // We track it per-hold-press below.

    const redSk  = red.skaters[red.active];
    const blueSk = blue.skaters[blue.active];

    // ── RED movement ──
    if (redSplit) {
      // Skater 0 — pad 0
      const s0 = red.skaters[0];
      const hd0 = redHoldDown0;
      let { ax: ax0, ay: ay0 } = normalizeInput(
        rPad0 ? Math.sign(rPad0.ax) : 0,
        rPad0 ? Math.sign(rPad0.ay) : 0
      );
      moveEntity(s0, ax0, ay0, hd0 ? skaterSpeed * 0.8 : skaterSpeed, inner, stepScale, now);

      // Skater 1 — pad 1
      const s1 = red.skaters[1];
      const hd1 = redHoldDown1;
      let { ax: ax1, ay: ay1 } = normalizeInput(
        rPad1 ? Math.sign(rPad1.ax) : 0,
        rPad1 ? Math.sign(rPad1.ay) : 0
      );
      moveEntity(s1, ax1, ay1, hd1 ? skaterSpeed * 0.8 : skaterSpeed, inner, stepScale, now);

      // Goalie — pad 0 (first red pad)
      moveEntity(red.goalie, 0,
        rPad0 ? rPad0.goalieY : 0,
        goalieSpeed, GOALIE_BOUNDS, stepScale, now);
    } else {
      const redSpeed = redHoldDown ? skaterSpeed * 0.8 : skaterSpeed;
      let { ax: rAx, ay: rAy } = normalizeInput(
        rPad0 ? Math.sign(rPad0.ax) : (keys.has('KeyD') ? 1 : 0) + (keys.has('KeyA') ? -1 : 0),
        rPad0 ? Math.sign(rPad0.ay) : (keys.has('KeyS') ? 1 : 0) + (keys.has('KeyW') ? -1 : 0)
      );
      for (let i = 0; i < red.skaters.length; i++)
        moveEntity(red.skaters[i], i === red.active ? rAx : 0, i === red.active ? rAy : 0,
                   i === red.active ? redSpeed : 0, inner, stepScale, now);
      moveEntity(red.goalie, 0,
        rPad0 ? rPad0.goalieY : (keys.has('KeyG') ? 1 : 0) + (keys.has('KeyT') ? -1 : 0),
        goalieSpeed, GOALIE_BOUNDS, stepScale, now);
    }

    // ── BLUE movement ──
    if (blueSplit) {
      const s0 = blue.skaters[0];
      const hd0 = blueHoldDown0;
      let { ax: ax0, ay: ay0 } = normalizeInput(
        bPad0 ? Math.sign(bPad0.ax) : 0,
        bPad0 ? Math.sign(bPad0.ay) : 0
      );
      moveEntity(s0, ax0, ay0, hd0 ? skaterSpeed * 0.8 : skaterSpeed, inner, stepScale, now);

      const s1 = blue.skaters[1];
      const hd1 = blueHoldDown1;
      let { ax: ax1, ay: ay1 } = normalizeInput(
        bPad1 ? Math.sign(bPad1.ax) : 0,
        bPad1 ? Math.sign(bPad1.ay) : 0
      );
      moveEntity(s1, ax1, ay1, hd1 ? skaterSpeed * 0.8 : skaterSpeed, inner, stepScale, now);

      moveEntity(blue.goalie, 0,
        bPad0 ? bPad0.goalieY : 0,
        goalieSpeed, GOALIE_BOUNDS, stepScale, now);
    } else {
      const blueSpeed = blueHoldDown ? skaterSpeed * 0.8 : skaterSpeed;
      let { ax: bAx, ay: bAy } = normalizeInput(
        bPad0 ? Math.sign(bPad0.ax) : (keys.has('ArrowRight') ? 1 : 0) + (keys.has('ArrowLeft') ? -1 : 0),
        bPad0 ? Math.sign(bPad0.ay) : (keys.has('ArrowDown')  ? 1 : 0) + (keys.has('ArrowUp')   ? -1 : 0)
      );
      for (let i = 0; i < blue.skaters.length; i++)
        moveEntity(blue.skaters[i], i === blue.active ? bAx : 0, i === blue.active ? bAy : 0,
                   i === blue.active ? blueSpeed : 0, inner, stepScale, now);
      moveEntity(blue.goalie, 0,
        bPad0 ? bPad0.goalieY : (keys.has('KeyL') ? 1 : 0) + (keys.has('KeyO') ? -1 : 0),
        goalieSpeed, GOALIE_BOUNDS, stepScale, now);
    }

    // Global overlap relaxation
    resolveAllSkaterOverlaps(now, 5);

    // Hold + tackle
    // In split mode, process each skater independently with its own hold state.
    if (redSplit) {
      for (let i = 0; i < red.skaters.length; i++) {
        const sk = red.skaters[i];
        const hd = i === 0 ? redHoldDown0 : redHoldDown1;
        const hp = i === 0 ? redHoldPressed0 : redHoldPressed1;
        const before = puck.heldBy;
        tryHold(red, sk, hd, now);
        if (hp && puck.heldBy === before && puck.heldBy !== sk) {
          red.active = i;
          attemptTackle(sk, red, blue, now);
        }
        if (puck.heldBy === sk) red.active = i;
      }
    } else {
      const beforeRed = puck.heldBy;
      tryHold(red, redSk, redHoldDown, now);
      if (redHoldPressed && puck.heldBy === beforeRed && puck.heldBy !== redSk)
        attemptTackle(redSk, red, blue, now);
    }

    if (blueSplit) {
      for (let i = 0; i < blue.skaters.length; i++) {
        const sk = blue.skaters[i];
        const hd = i === 0 ? blueHoldDown0 : blueHoldDown1;
        const hp = i === 0 ? blueHoldPressed0 : blueHoldPressed1;
        const before = puck.heldBy;
        tryHold(blue, sk, hd, now);
        if (hp && puck.heldBy === before && puck.heldBy !== sk) {
          blue.active = i;
          attemptTackle(sk, blue, red, now);
        }
        if (puck.heldBy === sk) blue.active = i;
      }
    } else {
      const beforeBlue = puck.heldBy;
      tryHold(blue, blueSk, blueHoldDown, now);
      if (blueHoldPressed && puck.heldBy === beforeBlue && puck.heldBy !== blueSk)
        attemptTackle(blueSk, blue, red, now);
    }

    // Extra goalie collision passes for stability
    for (let pass = 0; pass < 2; pass++)
      for (const s of ALL_SKATERS)
        for (const g of [red.goalie, blue.goalie])
          resolveSkaterVsRect(s, g, OPTS_GOALIE, now);

    // One more relaxation after tackles/goalie pushes
    resolveAllSkaterOverlaps(now, 4);

    // Release
    if (redSplit) {
      if (!redHoldDown0 && puck.heldBy === red.skaters[0]) releaseIfNeeded(red, false, now);
      if (!redHoldDown1 && puck.heldBy === red.skaters[1]) releaseIfNeeded(red, false, now);
    } else {
      releaseIfNeeded(red, redHoldDown, now);
    }
    if (blueSplit) {
      if (!blueHoldDown0 && puck.heldBy === blue.skaters[0]) releaseIfNeeded(blue, false, now);
      if (!blueHoldDown1 && puck.heldBy === blue.skaters[1]) releaseIfNeeded(blue, false, now);
    } else {
      releaseIfNeeded(blue, blueHoldDown, now);
    }

    // Puck movement (substeps)
    if (puck.heldBy) {
      puck.x = puck.heldBy.x + puck.heldBy.w / 2;
      puck.y = puck.heldBy.y + puck.heldBy.h / 2;
    } else {
      const travel = Math.max(Math.abs(puck.vx), Math.abs(puck.vy)) * stepScale;
      const steps  = Math.min(24, Math.max(1, Math.ceil(travel / PUCK_MAX_STEP_PX)));
      const sub    = stepScale / steps;

      for (let i = 0; i < steps; i++) {
        prevPuckX = puck.x;
        puck.x += puck.vx * sub;
        puck.y += puck.vy * sub;

        if (checkGoal()) break;

        for (const r   of GOAL_FRAME_RECTS) collidePuck(r,   now, OPTS_DAMP);
        puckWallBounce();
        for (const ent of ALL_ENTITIES)     collidePuck(ent, now, OPTS_ENTITY);

        if (redSplit) {
          tryHold(red, red.skaters[0], redHoldDown0, now);
          tryHold(red, red.skaters[1], redHoldDown1, now);
        } else {
          tryHold(red, redSk, redHoldDown, now);
        }
        if (blueSplit) {
          tryHold(blue, blue.skaters[0], blueHoldDown0, now);
          tryHold(blue, blue.skaters[1], blueHoldDown1, now);
        } else {
          tryHold(blue, blueSk, blueHoldDown, now);
        }
        if (puck.heldBy) break;
      }
    }

    scoreEl.textContent = `Red ${red.score} — ${blue.score} Blue`;
    if (gameOver) scoreEl.textContent += `   ·   ${winner} wins! (press both hold buttons to restart)`;

    pressed.clear();
    pressedByChar.clear();
  }

  // ==========================================================
  // DRAW
  // ==========================================================
  function drawRink() {
    roundedRectPath(inner.x, inner.y, inner.w, inner.h, cornerR);
    ctx.fillStyle = '#aaaacc';
    ctx.fill();

    ctx.save();
    ctx.globalAlpha = 0.18; ctx.strokeStyle = '#b9d7ff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W/2, inner.y); ctx.lineTo(W/2, inner.y + inner.h); ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.fillStyle = '#000000';
    for (const r of GOAL_FRAME_RECTS) ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.restore();
  }

  function drawEntity(ent, teamColor, isActiveSkater, alpha) {
    ctx.save();

    if (ent.isGoalie) {
      ctx.fillStyle = teamColor; ctx.globalAlpha = 0.95;
      const rx = ent.prevX !== undefined ? ent.prevX + (ent.x - ent.prevX) * alpha : ent.x;
      const ry = ent.prevY !== undefined ? ent.prevY + (ent.y - ent.prevY) * alpha : ent.y;
      ctx.fillRect(rx, ry, ent.w, ent.h);
      ctx.restore(); return;
    }

    const isHolding = (puck.heldBy === ent);
    const img = (ent.team === 'red')
      ? (isHolding ? skaterSprites.red.hold  : skaterSprites.red.free)
      : (isHolding ? skaterSprites.blue.hold : skaterSprites.blue.free);
    const rx = ent.prevX !== undefined ? ent.prevX + (ent.x - ent.prevX) * alpha : ent.x;
    const ry = ent.prevY !== undefined ? ent.prevY + (ent.y - ent.prevY) * alpha : ent.y;
    const cx = rx + ent.w * 0.5, cy = ry + ent.h * 0.5;

    if (spritesReady && img?.complete && img.naturalWidth > 0) {
      ctx.translate(cx, cy); ctx.rotate(ent.heading); ctx.globalAlpha = 1.0;
      ctx.drawImage(img, -ent.w * 0.5, -ent.h * 0.5, ent.w, ent.h);
      if (isActiveSkater) {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, Math.min(ent.w, ent.h) * 0.75, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.restore(); return;
    }

    // Fallback: circle
    ctx.fillStyle = teamColor; ctx.globalAlpha = 0.9;
    const r = Math.min(ent.w, ent.h) * 0.5;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    if (isActiveSkater) { ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 2; ctx.stroke(); }
    if (isHolding) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.beginPath(); ctx.arc(cx + r * 0.25, cy + r * 0.2, 3, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  function drawPuck(alpha) {
    const px = puck.prevX !== undefined ? puck.prevX + (puck.x - puck.prevX) * alpha : puck.x;
    const py = puck.prevY !== undefined ? puck.prevY + (puck.y - puck.prevY) * alpha : puck.y;
    ctx.save();
    ctx.beginPath(); ctx.arc(px, py, puckR, 0, Math.PI * 2);
    ctx.fillStyle = '#000000'; ctx.globalAlpha = 0.95; ctx.fill();
    if (puck.heldBy) {
      ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#0b0f14'; ctx.fill();
    }
    ctx.restore();
  }

  function draw(alpha) {
    ctx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);

    let ox = 0, oy = 0;
    if (gameNowMs < shakeUntil && shakeDurationMs > 0) {
      const amp = shakeAmpBase * (shakeUntil - gameNowMs) / shakeDurationMs;
      ox = (Math.random() * 2 - 1) * amp;
      oy = (Math.random() * 2 - 1) * amp;
    }

    ctx.save(); ctx.translate(ox, oy);
    drawRink();
    drawEntity(red.goalie,      red.color,  false,             alpha);
    drawEntity(blue.goalie,     blue.color, false,             alpha);
    drawEntity(red.skaters[0],  red.color,  red.active  === 0, alpha);
    drawEntity(red.skaters[1],  red.color,  red.active  === 1, alpha);
    drawEntity(blue.skaters[0], blue.color, blue.active === 0, alpha);
    drawEntity(blue.skaters[1], blue.color, blue.active === 1, alpha);
    drawPuck(alpha);
    ctx.restore();

    if (gameNowMs < goalFlashUntil) {
      ctx.save();
      ctx.globalAlpha = 0.75; ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, H * 0.34, W, H * 0.32);
      ctx.restore();
      ctx.save();
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = "900 72px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif";
      ctx.fillStyle = goalFlashColor;
      ctx.fillText(goalFlashText, W / 2, H / 2);
      ctx.restore();
    }
  }

  // ==========================================================
  // RAF
  // ==========================================================
  function snapshotPrev() {
    for (const e of ALL_ENTITIES) { e.prevX = e.x; e.prevY = e.y; }
    puck.prevX = puck.x; puck.prevY = puck.y;
  }

  function tick(realTs) {
    if (!lastRealTs) lastRealTs = realTs;
    const rawDtSec = Math.min((realTs - lastRealTs) / 1000, MAX_DT_SEC);
    lastRealTs = realTs;
    accumulator += rawDtSec;
    while (accumulator >= FIXED_DT_SEC) {
      snapshotPrev();
      update(FIXED_DT_SEC);
      accumulator -= FIXED_DT_SEC;
    }
    draw(accumulator / FIXED_DT_SEC);
    requestAnimationFrame(tick);
  }

  resetPuck();
  loadSkaterSprites();
  requestAnimationFrame(tick);
})();
</script>
